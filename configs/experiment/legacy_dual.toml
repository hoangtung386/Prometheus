[model]
in_chans = 3
num_tissue_classes = 6
num_nuclei_classes = 11
encoder_dims = [96, 192, 384, 768]
encoder_depths = [3, 3, 9, 3]
use_moe = false

[training]
model_type = "DualUNet"
batch_size = 4
epochs = 100
lr = 0.0002

[data]
root = "/path/to/puma"
image_size = 1024
validation_fraction = 0.1
split_seed = 42
split_manifest = "runs/splits/puma.json"

[evaluation]
nuclei_radius_px = 15.0
checkpoint_metric = "combined"
track = "track2"
